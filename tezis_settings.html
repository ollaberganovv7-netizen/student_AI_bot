<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tezis Sozlamalari</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="static/styles.css">
    <style>
        body { display: flex; flex-direction: column; gap: 12px; }
        .price-display {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            color: var(--success);
            padding: 8px 0;
            background: linear-gradient(135deg, rgba(16,185,129,0.08), transparent);
            border-radius: var(--radius-md);
        }
        .words-box {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.15);
            padding: 12px;
            border-radius: var(--radius-md);
            font-size: 13px;
            color: var(--accent-light);
            text-align: center;
        }
        .range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 4px;
        }
    </style>
</head>

<body>

    <div class="page-header animate-in">
        <h1>🎓 Tezis</h1>
        <p>Ilmiy maqola sozlamalari</p>
    </div>

    <div class="input-group animate-in">
        <label>Mavzu</label>
        <input type="text" id="topic" placeholder="Masalan: Sun'iy intellektning ta'limdagi o'rni">
    </div>

    <div class="input-group animate-in">
        <label>Muallif ism-sharifi</label>
        <input type="text" id="author" placeholder="Masalan: Alisherov Anvar">
    </div>

    <div class="input-group animate-in">
        <label>🏫 Universitet / Muassasa</label>
        <input type="text" id="university" placeholder="Masalan: Toshkent Davlat Texnika Universiteti">
    </div>

    <div class="input-group animate-in">
        <label>Tuzilma</label>
        <select id="structure">
            <option value="Standart">Standart (Kirish - Asosiy qism - Xulosa)</option>
            <option value="IMRAD">IMRAD (Ilmiy: Adabiyot, Metodologiya...)</option>
        </select>
    </div>

    <div class="input-group animate-in">
        <label>🌐 Til</label>
        <select id="language">
            <option value="uz">O'zbekcha 🇺🇿</option>
            <option value="ru">Русский 🇷🇺</option>
            <option value="en">English 🇬🇧</option>
        </select>
    </div>

    <div class="card animate-in" style="padding:14px 16px;">
        <div class="slider-header">
            <span>📄 Hajmi (Sahifalar):</span>
            <span class="slider-value" id="page-count">5</span>
        </div>
        <input type="range" id="pages" min="5" max="20" step="5" value="5">
        <div class="range-labels">
            <span>5</span><span>10</span><span>15</span><span>20</span>
        </div>
    </div>

    <div class="words-box animate-in" id="words-info">
        Hajmi: ~1000 ta so'z
    </div>

    <div class="price-display animate-in" id="price-display">
        4 000 so'm
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setBackgroundColor('#0f172a');
        tg.setHeaderColor('#0f172a');
        tg.MainButton.text = "Saqlash va yaratish";
        tg.MainButton.show();

        const PRICES = { 5: 4000, 10: 6000, 15: 8000, 20: 10000 };
        const WORDS = { 5: 1000, 10: 2000, 15: 3000, 20: 4000 };

        const pagesInput = document.getElementById('pages');
        const pageCountDisp = document.getElementById('page-count');
        const priceDisp = document.getElementById('price-display');
        const wordsInfo = document.getElementById('words-info');

        function updateUI() {
            const val = parseInt(pagesInput.value);
            pageCountDisp.innerText = val;
            priceDisp.innerText = PRICES[val].toLocaleString() + " so'm";
            wordsInfo.innerText = "Hajmi: ~" + WORDS[val] + " ta so'z";
        }

        pagesInput.addEventListener('input', updateUI);

        tg.MainButton.onClick(() => {
            const topic = document.getElementById('topic').value.trim();
            const author = document.getElementById('author').value.trim();

            if (topic.length < 5) {
                tg.showAlert("Iltimos, mavzuni to'liqroq kiriting.");
                return;
            }
            if (author.length < 3) {
                tg.showAlert("Iltimos, muallif ismini kiriting.");
                return;
            }

            tg.sendData(JSON.stringify({
                type: "tezis_settings",
                topic: topic,
                author: author,
                university: document.getElementById('university').value.trim(),
                structure: document.getElementById('structure').value,
                language: document.getElementById('language').value,
                pages: parseInt(pagesInput.value)
            }));
        });

        updateUI();
    </script>
</body>

</html>
