<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dizayn Katalog</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="static/styles.css">
    <style>
        body { padding-bottom: 90px; }
        #catalog-list { display: flex; flex-direction: column; gap: 8px; }
        .selected-badge {
            position: absolute;
            top: 6px;
            right: 6px;
            background: var(--success);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            box-shadow: 0 2px 6px rgba(16,185,129,0.4);
        }
        .preview-container { position: relative; }
    </style>
</head>
<body>

    <div class="page-header animate-in">
        <h1>Dizayn tanlash</h1>
        <p>Taqdimot uchun shablon tanlang</p>
    </div>

    <div class="search-box animate-in">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Qidirish..." oninput="filterTemplates()">
    </div>

    <div id="catalog-list">
        <!-- Dynamic categories -->
    </div>

    <div class="fixed-footer" id="footer">
        <button class="btn btn-primary" id="confirm-btn">✅ Dizaynni tanlash</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setBackgroundColor('#0f172a');
        tg.setHeaderColor('#0f172a');

        let selectedId = null;
        let templates = [];
        let searchQuery = '';

        const CATEGORY_ICONS = {
            'General': '📁', 'modern': '✨', 'Biology': '🧬', 'IT': '💻',
            'Buxgalteriya': '📊', 'Medicine': '⚕️', 'History': '📜', 'Science': '🔬',
            'Education': '🎓', 'Business': '💼', 'Art': '🎨', 'Sport': '⚽',
            'Music': '🎵', 'Law': '⚖️',
        };

        async function loadData() {
            try {
                const res = await fetch(`data/templates.json?v=${Date.now()}`);
                templates = await res.json();
                render();
            } catch (e) { console.error(e); }
        }

        function filterTemplates() {
            searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            render();
        }

        function getFiltered() {
            if (!searchQuery) return templates;
            return templates.filter(t =>
                t.name.toLowerCase().includes(searchQuery) ||
                t.category.toLowerCase().includes(searchQuery)
            );
        }

        function render() {
            const list = document.getElementById('catalog-list');
            const filtered = getFiltered();
            const categories = [...new Set(filtered.map(t => t.category))];

            list.innerHTML = categories.map((cat, idx) => {
                const catTemplates = filtered.filter(t => t.category === cat);
                const icon = CATEGORY_ICONS[cat] || '📂';
                return `
                <div class="category-item animate-in" style="animation-delay:${idx * 0.04}s" id="cat-${CSS.escape(cat)}">
                    <div class="category-header" onclick="toggle('${cat.replace(/'/g, "\\'")}')">
                        <div class="category-title">
                            ${icon} ${cat}
                            <span class="category-count">${catTemplates.length}</span>
                        </div>
                        <svg class="chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
                    </div>
                    <div class="templates-content">
                        ${catTemplates.length > 0 && !catTemplates[0].is_empty ? catTemplates.map(t => `
                            <div class="template-card ${selectedId === t.id ? 'selected' : ''}" onclick="select('${t.id}')">
                                <div class="preview-container">
                                    <img src="${t.preview}" class="preview-img" loading="lazy" onerror="this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;font-size:28px;background:var(--bg-card)\\'>🎨</div>'">
                                    ${selectedId === t.id ? '<div class="selected-badge">✓</div>' : ''}
                                </div>
                                <div class="card-footer">
                                    <span class="template-name">${t.name}</span>
                                    <span class="size-tag">${t.file_size}</span>
                                </div>
                            </div>
                        `).join('') : '<div class="empty-msg">Hozircha shablonlar yo\'q</div>'}
                    </div>
                </div>
            `}).join('');

            if (categories.length === 0 && searchQuery) {
                list.innerHTML = '<div class="empty-msg" style="padding:40px 0;">Hech narsa topilmadi</div>';
            }
        }

        function toggle(cat) {
            const item = document.getElementById(`cat-${CSS.escape(cat)}`);
            if (item) {
                item.classList.toggle('active');
                item.querySelector('.category-header').classList.toggle('open');
            }
        }

        function select(id) {
            selectedId = id;
            document.getElementById('footer').classList.add('visible');
            render();
            tg.HapticFeedback.selectionChanged();
        }

        document.getElementById('confirm-btn').onclick = () => {
            const t = templates.find(x => x.id === selectedId);
            if (t) {
                tg.HapticFeedback.impactOccurred('medium');
                tg.sendData(JSON.stringify({ template_id: t.id, template_name: t.name }));
            }
        };

        loadData();
    </script>
</body>
</html>
