<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yuborilmoqda...</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="static/styles.css">
<style>
body { display:flex; align-items:center; justify-content:center; min-height:80vh; }
.loader { text-align:center; }
.loader .spinner { width:48px; height:48px; border:4px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.loader p { color:var(--text-secondary); font-size:14px; }
.loader .ok { font-size:48px; margin-bottom:12px; }
.loader .err { color:#ef4444; }
</style>
</head>
<body>
<div class="loader" id="loader">
    <div class="spinner"></div>
    <p>Ma'lumotlar yuborilmoqda...</p>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setBackgroundColor('#0f172a');
tg.setHeaderColor('#0f172a');

try {
    const raw = localStorage.getItem('pending_job');
    if (!raw) throw new Error('No data');
    
    const job = JSON.parse(raw);
    localStorage.removeItem('pending_job');
    
    // sendData works here because this page is opened via KeyboardButton
    tg.sendData(JSON.stringify(job));
    
    // Show success briefly
    document.getElementById('loader').innerHTML = '<div class="ok">✅</div><p>Yaratish boshlandi!</p>';
    setTimeout(() => tg.close(), 1000);
} catch(e) {
    document.getElementById('loader').innerHTML = '<div class="ok">⚠️</div><p class="err">Ma\'lumot topilmadi. Mini App orqali qayta urinib ko\'ring.</p>';
    setTimeout(() => tg.close(), 2500);
}

tg.ready();
</script>
</body>
</html>
