<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tilni tanlang | Выберите язык | Choose language</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: var(--tg-theme-bg-color, #1a112c);
            color: var(--tg-theme-text-color, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .lang-card {
            background-color: #12091e;
            border-radius: 16px;
            padding: 25px 20px;
            width: 100%;
            max-width: 400px;
            position: relative;
            box-sizing: border-box;
        }
        .lang-row {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            position: relative;
        }
        .lang-row:last-child {
            margin-bottom: 0;
        }
        /* Vertical dotted line connecting the flags */
        .lang-card::before {
            content: '';
            position: absolute;
            left: 31px;
            top: 45px;
            bottom: 45px;
            width: 2px;
            background: repeating-linear-gradient(
                to bottom,
                #6b48ff,
                #6b48ff 4px,
                transparent 4px,
                transparent 8px
            );
            z-index: 1;
        }
        .icon-container {
            width: 24px;
            height: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #12091e;
            z-index: 2;
            margin-right: 15px;
            font-size: 16px;
        }
        .text-content {
            flex: 1;
            padding-right: 10px;
        }
        .text-title {
            font-size: 14px;
            font-weight: 600;
            color: #a78bfa;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .text-subtitle {
            font-size: 12px;
            color: #9ca3af;
            line-height: 1.4;
        }
        .lang-btn {
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .lang-btn:active {
            opacity: 0.8;
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <div class="lang-card">
        <!-- UZ -->
        <div class="lang-row">
            <div class="icon-container">🇺🇿</div>
            <div class="text-content">
                <div class="text-title">🌐 Iltimos, tilni tanlang</div>
                <div class="text-subtitle">Sizga qulay tilni tanlab, davom eting.</div>
            </div>
            <button class="lang-btn" onclick="selectLang('uz')">🇺🇿 O'zbekcha</button>
        </div>

        <!-- RU -->
        <div class="lang-row">
            <div class="icon-container">🇷🇺</div>
            <div class="text-content">
                <div class="text-title" style="color: #c084fc;">Пожалуйста, выберите язык</div>
                <div class="text-subtitle">Выберите удобный язык и продолжите.</div>
            </div>
            <button class="lang-btn" onclick="selectLang('ru')">🇷🇺 Русский</button>
        </div>

        <!-- EN -->
        <div class="lang-row">
            <div class="icon-container">🇬🇧</div>
            <div class="text-content">
                <div class="text-title" style="color: #e879f9;">Please select a language</div>
                <div class="text-subtitle">Choose your preferred language to continue.</div>
            </div>
            <button class="lang-btn" onclick="selectLang('en')">🇬🇧 English</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function selectLang(lang) {
            localStorage.setItem('bot_language', lang);
            
            // Pass the selected language to catalog.html
            const urlParams = new URLSearchParams(window.location.search);
            urlParams.set('lang', lang);
            window.location.href = 'catalog.html?' + urlParams.toString();
        }

        // If the URL already contains a lang parameter (e.g. from the bot button), 
        // we skip this page and go straight to the catalog
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.has('lang')) {
            localStorage.setItem('bot_language', urlParams.get('lang'));
            window.location.href = 'catalog.html?' + urlParams.toString();
        }
    </script>
</body>
</html>
