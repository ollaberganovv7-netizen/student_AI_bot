<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontentni Tahrirlash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="static/styles.css">
    <style>
        body { display: flex; flex-direction: column; gap: 14px; }
    </style>
</head>
<body>

    <div class="page-header animate-in">
        <h1>Kontent Sozlamalari</h1>
        <p>Qo'shimcha ma'lumotlar va uslub</p>
    </div>

    <div class="input-group animate-in">
        <label>Qo'shimcha ma'lumotlar / Manbalar</label>
        <textarea id="extra-info" rows="5" placeholder="Bu yerga taqdimotda ishlatilishi kerak bo'lgan matn yoki maxsus talablarni yozing..."></textarea>
    </div>

    <div class="input-group animate-in">
        <label>Taqdimot uslubi</label>
        <select id="tone">
            <option value="academic">📚 Akademik / Ilmiy</option>
            <option value="business">💼 Rasmiy / Biznes</option>
            <option value="creative">🎨 Kreativ / Erkin</option>
        </select>
    </div>

    <div class="toggle-group animate-in">
        <div>
            <div style="font-weight: 700;">🖼 Rasmlar qo'shish</div>
            <div class="hint">Slaydlarga mavzuga oid rasmlar qo'shiladi</div>
        </div>
        <label class="switch">
            <input type="checkbox" id="add-images" checked>
            <span class="slider-track"></span>
        </label>
    </div>

    <button class="btn btn-primary animate-in" onclick="saveContent()">Saqlash</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setBackgroundColor('#0f172a');
        tg.setHeaderColor('#0f172a');

        function saveContent() {
            tg.HapticFeedback.impactOccurred("medium");
            const data = {
                action: 'content_update',
                extra_info: document.getElementById('extra-info').value,
                tone: document.getElementById('tone').value,
                add_images: document.getElementById('add-images').checked
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
