<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontentni Tahrirlash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #1e293b;
            --input-bg: #0f172a;
            --accent: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        h2 { text-align: center; font-size: 20px; margin: 0; }

        .input-group {
            background: var(--input-bg);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: transparent;
            border: none;
            color: var(--text-main);
            padding: 0;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        select {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            outline: none;
        }

        .toggle-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--input-bg);
            padding: 16px;
            border-radius: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #475569;
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-save {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }

        .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    </style>
</head>
<body>

    <h2>Kontent Sozlamalari</h2>

    <div class="input-group">
        <label>Qo'shimcha ma'lumotlar / Manbalar</label>
        <textarea id="extra-info" placeholder="Bu yerga taqdimotda ishlatilishi kerak bo'lgan matn yoki maxsus talablarni yozing..."></textarea>
    </div>

    <div class="input-group">
        <label>Taqdimot uslubi (Tone)</label>
        <select id="tone">
            <option value="academic">Akademik / Ilmiy</option>
            <option value="business">Rasmiy / Biznes</option>
            <option value="creative">Kreativ / Erkin</option>
        </select>
    </div>

    <div class="toggle-group">
        <div>
            <div style="font-weight: 700;">Rasmlar qo'shish</div>
            <div class="hint">Slaydlarga mavzuga oid rasmlar qo'shiladi</div>
        </div>
        <label class="switch">
            <input type="checkbox" id="add-images" checked>
            <span class="slider"></span>
        </label>
    </div>

    <button class="btn-save" onclick="saveContent()">Saqlash</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function saveContent() {
            tg.HapticFeedback.impactOccurred("medium");
            const data = {
                action: 'content_update',
                extra_info: document.getElementById('extra-info').value,
                tone: document.getElementById('tone').value,
                add_images: document.getElementById('add-images').checked
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
