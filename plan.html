<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taqdimot Rejasi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="static/styles.css">
    <style>
        body { display: flex; flex-direction: column; gap: 14px; }
        .content-section { display: none; }
        .content-section.active { display: block; }
    </style>
</head>
<body>

    <div class="page-header animate-in">
        <h1>Taqdimot Rejasi</h1>
        <p>Bo'limlarni sozlang</p>
    </div>

    <div class="tab-container animate-in">
        <div class="tab active" onclick="switchTab('auto')">🤖 Avtomatik (AI)</div>
        <div class="tab" onclick="switchTab('manual')">✏️ O'zim yozaman</div>
    </div>

    <!-- AI / Auto Section -->
    <div id="auto-section" class="content-section active animate-in">
        <div class="slider-group">
            <div class="slider-header">
                <span>Bo'limlar soni (Mundarija)</span>
                <span class="slider-value" id="auto-count">4</span>
            </div>
            <input type="range" id="auto-chapters" min="3" max="10" value="4" oninput="document.getElementById('auto-count').innerText=this.value">
        </div>
        <p class="hint" style="margin-top:8px;">Sun'iy intellekt mavzudan kelib chiqib eng mos mundarijani avtomatik shakllantiradi.</p>
    </div>

    <!-- Manual Section -->
    <div id="manual-section" class="content-section animate-in">
        <div class="slider-group">
            <div class="slider-header">
                <span>Bo'limlar soni</span>
                <span class="slider-value" id="manual-count">4</span>
            </div>
            <input type="range" id="manual-chapters" min="2" max="10" value="4" oninput="updateManualFields(this.value)">
        </div>
        <div class="chapter-fields" id="chapter-fields"></div>
        <p class="hint" style="margin-top:8px;">Har bir bo'lim uchun nom kiriting.</p>
    </div>

    <button class="btn btn-primary animate-in" onclick="savePlan()">Rejani Saqlash</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setBackgroundColor('#0f172a');
        tg.setHeaderColor('#0f172a');

        let currentMode = 'auto';

        function switchTab(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', (mode === 'auto' && i === 0) || (mode === 'manual' && i === 1));
            });
            document.getElementById('auto-section').classList.toggle('active', mode === 'auto');
            document.getElementById('manual-section').classList.toggle('active', mode === 'manual');
            if (mode === 'manual') updateManualFields(document.getElementById('manual-chapters').value);
            tg.HapticFeedback.selectionChanged();
        }

        function updateManualFields(count) {
            count = parseInt(count);
            document.getElementById('manual-count').innerText = count;

            const container = document.getElementById('chapter-fields');
            const existing = container.querySelectorAll('.chapter-field input');
            const existingValues = Array.from(existing).map(i => i.value);

            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const field = document.createElement('div');
                field.className = 'chapter-field';
                field.innerHTML = `
                    <span class="chapter-num">${i + 1}.</span>
                    <input type="text" placeholder="Bo'lim nomi..." value="${existingValues[i] || ''}">
                `;
                container.appendChild(field);
            }
        }

        // Initialize manual fields on load
        updateManualFields(4);

        function savePlan() {
            tg.HapticFeedback.impactOccurred("medium");
            let data;

            if (currentMode === 'auto') {
                data = {
                    action: 'plan_update',
                    mode: 'auto',
                    num_chapters: document.getElementById('auto-chapters').value
                };
            } else {
                const inputs = document.querySelectorAll('#chapter-fields input');
                const chapters = Array.from(inputs).map(i => i.value.trim()).filter(v => v);
                const plan = chapters.map((c, i) => `${i + 1}. ${c}`).join('\n');
                data = {
                    action: 'plan_update',
                    mode: 'manual',
                    num_chapters: inputs.length,
                    manual_plan: plan
                };
            }

            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
