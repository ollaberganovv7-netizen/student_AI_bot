<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mustaqil Ish Tahrirlash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="static/styles.css">
    <style>
        body { display: flex; flex-direction: column; gap: 12px; }
        .container { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

    <div class="page-header animate-in">
        <h1 id="title">Mavzu nomi</h1>
    </div>

    <div id="plan-container" class="container hidden">
        <div class="input-group animate-in">
            <label>Reja 1</label>
            <input type="text" class="plan-input" placeholder="Kirish...">
        </div>
        <div class="input-group animate-in">
            <label>Reja 2</label>
            <input type="text" class="plan-input" placeholder="Asosiy qism...">
        </div>
        <div class="input-group animate-in">
            <label>Reja 3</label>
            <input type="text" class="plan-input" placeholder="Tahlil...">
        </div>
        <div class="input-group animate-in">
            <label>Reja 4</label>
            <input type="text" class="plan-input" placeholder="Xulosa...">
        </div>
    </div>

    <div id="text-container" class="container">
        <div class="input-group animate-in">
            <label id="input-label">Ma'lumot</label>
            <textarea id="main-input" rows="6" placeholder="Batafsil yozing..."></textarea>
        </div>
    </div>

    <button class="btn btn-primary animate-in" id="save-btn">Saqlash</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setBackgroundColor('#0f172a');
        tg.setHeaderColor('#0f172a');

        const urlParams = new URLSearchParams(window.location.search);
        const action = urlParams.get('action');
        const topic = urlParams.get('topic') || "Tahrirlash";
        const initialValue = urlParams.get('value') || "";

        const titleEl = document.getElementById('title');
        const labelEl = document.getElementById('input-label');
        const inputEl = document.getElementById('main-input');
        const planContainer = document.getElementById('plan-container');
        const textContainer = document.getElementById('text-container');
        const saveBtn = document.getElementById('save-btn');

        titleEl.innerText = topic;

        if (action === 'add_plan') {
            planContainer.classList.remove('hidden');
            textContainer.classList.add('hidden');
            
            if (initialValue) {
                const lines = initialValue.split('\n').map(l => l.replace(/^\d+\.\s*/, '').trim()).filter(l => l);
                const inputs = document.querySelectorAll('.plan-input');
                lines.forEach((line, idx) => {
                    if (inputs[idx]) inputs[idx].value = line;
                });
            }
        } else {
            planContainer.classList.add('hidden');
            textContainer.classList.remove('hidden');
            inputEl.value = initialValue;
            
            if (action === 'edit_knowledge') {
                labelEl.innerText = "Bilimlarni tahrirlash";
            } else {
                labelEl.innerText = "Umumiy tahrirlash";
            }
        }

        saveBtn.addEventListener('click', () => {
            let finalValue = "";
            
            if (action === 'add_plan') {
                const inputs = document.querySelectorAll('.plan-input');
                const plans = Array.from(inputs).map(i => i.value.trim()).filter(v => v !== "");
                if (plans.length === 0) {
                    tg.showAlert("Iltimos, kamida bitta reja bandini kiriting!");
                    return;
                }
                finalValue = plans.map((p, idx) => `${idx + 1}. ${p}`).join('\n');
            } else {
                finalValue = inputEl.value.trim();
                if (!finalValue) {
                    tg.showAlert("Iltimos, ma'lumot kiriting!");
                    return;
                }
            }

            tg.HapticFeedback.impactOccurred("medium");
            tg.sendData(JSON.stringify({ action: action, value: finalValue }));
        });

        tg.ready();
    </script>
</body>
</html>
